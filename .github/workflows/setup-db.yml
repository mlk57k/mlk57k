name: Setup Database (apply migration)

on:
  workflow_dispatch:
    inputs:
      db_password:
        description: 'Mot de passe Supabase → Settings → Database → "Database password"'
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply migration
        run: |
          PGPASSWORD="${{ github.event.inputs.db_password }}" psql \
            "postgresql://postgres@db.hlqyhtgzghlgbvetojra.supabase.co:5432/postgres" \
            -f supabase/migrations/0001_init.sql
        continue-on-error: false
