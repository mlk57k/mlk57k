name: Fix ANTHROPIC_API_KEY (strip spaces)

on:
  workflow_dispatch:
    inputs:
      new_key:
        description: 'Nouvelle clé ANTHROPIC_API_KEY (sk-ant-...) — les espaces seront nettoyés automatiquement'
        required: false
        default: ''

env:
  VERCEL_ORG_ID: team_Gk17lZmjSWqGtF6aE5W89x9A
  VERCEL_PROJECT_ID: prj_3upPIEWu1x6wzrwU4AlLVKKGXdcJ

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          printf '{"projectId":"prj_3upPIEWu1x6wzrwU4AlLVKKGXdcJ","orgId":"team_Gk17lZmjSWqGtF6aE5W89x9A"}' > .vercel/project.json

      - name: Pull env, strip spaces, re-push
        run: |
          vercel env pull .env.local --yes --token=${{ secrets.VERCEL_TOKEN }}
          python3 - <<'PYEOF'
          import re, os, json, urllib.request, urllib.error

          new_key = os.environ.get("NEW_KEY", "").strip()
          if new_key:
              raw_key = new_key
          else:
              with open('.env.local') as f:
                  content = f.read()
              match = re.search(r'ANTHROPIC_API_KEY=["\']?([^"\'\n]+)["\']?', content)
              if not match:
                  print("ANTHROPIC_API_KEY introuvable dans le fichier env")
                  exit(1)
              raw_key = match.group(1).strip()

          # Supprime tous les espaces/retours à la ligne et remplace le А cyrillique par A latin
          fixed_key = re.sub(r'\s+', '', raw_key).replace('А', 'A')

          print(f"Longueur originale : {len(raw_key)}, corrigée : {len(fixed_key)}")
          if not new_key and raw_key == fixed_key:
              print("Aucune correction nécessaire.")
              exit(0)

          TOKEN      = os.environ["VERCEL_TOKEN"]
          PROJECT_ID = "prj_3upPIEWu1x6wzrwU4AlLVKKGXdcJ"
          TEAM_ID    = "team_Gk17lZmjSWqGtF6aE5W89x9A"
          TARGETS    = ["production", "preview", "development"]

          def api(method, path, body=None):
              url  = f"https://api.vercel.com{path}?teamId={TEAM_ID}"
              data = json.dumps(body).encode() if body else None
              req  = urllib.request.Request(url, data=data, method=method,
                         headers={"Authorization": f"Bearer {TOKEN}",
                                  "Content-Type":  "application/json"})
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  return json.loads(e.read())

          resp     = api("GET", f"/v9/projects/{PROJECT_ID}/env")
          existing = {e["key"]: e["id"] for e in resp.get("envs", [])}

          if "ANTHROPIC_API_KEY" in existing:
              api("PATCH", f"/v10/projects/{PROJECT_ID}/env/{existing['ANTHROPIC_API_KEY']}", {"value": fixed_key})
              print("✅ ANTHROPIC_API_KEY corrigée dans Vercel")
          else:
              api("POST", f"/v10/projects/{PROJECT_ID}/env",
                  {"key": "ANTHROPIC_API_KEY", "value": fixed_key, "type": "encrypted", "target": TARGETS})
              print("✅ ANTHROPIC_API_KEY créée dans Vercel")
          PYEOF
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEW_KEY: ${{ github.event.inputs.new_key }}

      - name: Redeploy
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
